<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PhishGuard Mini</title>
    <style>
        body {
            width: 350px;
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #d1d5db;
            margin: 0;
            padding: 15px;
        }
        h2 {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            color: #ffffff;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #374151;
            padding-bottom: 10px;
        }
        .score-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #1f2937;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 15px auto;
            border: 4px solid #4ade80; /* default safe */
        }
        .score-circle.medium { border-color: #f59e0b; }
        .score-circle.high { border-color: #ef4444; }
        
        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }
        
        .threat-level {
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .section {
            background: #1f2937;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 12px;
        }
        .section-title {
            color: #9ca3af;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-size: 10px;
        }
        ul {
            margin: 0;
            padding-left: 15px;
        }
        button {
            width: 100%;
            padding: 8px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <h2>🛡️ PhishGuard Plugin</h2>
    
    <div id="loading" style="text-align: center; padding: 20px;">
        Analyzing current page...
    </div>

    <div id="results" style="display: none;">
        <div class="score-circle" id="score-circle">
            <div class="score-value" id="score-val">0</div>
        </div>
        <div class="threat-level" id="threat-level">SAFE</div>

        <div class="section" id="xai-summary"></div>
        
        <div class="section">
            <div class="section-title">Indicators Triggered</div>
            <ul id="triggers-list"></ul>
        </div>

        <button id="view-dashboard">Open Enterprise Dashboard</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
