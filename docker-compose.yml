version: '3.8'

services:
  phishguard:
    build: .
    container_name: phishguard_api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./artifacts:/app/artifacts
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/soc/threat-level"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: "1.0"
